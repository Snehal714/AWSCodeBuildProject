version: 0.2

env:
  variables:
    LINUX_DOWNLOAD_URL: "https://storage.googleapis.com/masst-assets/Defender-Binary-Integrator/1.0.0/Linux/MASSTCLI-v1.1.0-linux-amd64.zip"

phases:
  pre_build:
    commands:
      - apt-get update || yum update -y
      - curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip
      - mkdir -p /opt/android-sdk/cmdline-tools
      - unzip -q cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
      - mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest

      - export ANDROID_HOME=/opt/android-sdk
      - export ANDROID_SDK_ROOT=$ANDROID_HOME
      - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
      - export PATH=$PATH:$ANDROID_HOME/platform-tools

      - yes | sdkmanager --licenses
      - yes | sdkmanager "platform-tools"
      - yes | sdkmanager "platforms;android-36"
      - yes | sdkmanager "build-tools;36.0.0"
  build:
    commands:
      - echo "Downloading MASSTCLI..."
      - curl -L -o MASSTCLI.zip "$LINUX_DOWNLOAD_URL"

      - unzip -q MASSTCLI.zip -d masst

      - chmod +x $(find masst -type f -name "MASSTCLI*" | head -1)

      - echo "Repository contents:"
      - ls -la

      - echo "Checking required files..."
      - echo "ANDROID_HOME=$ANDROID_HOME"
      - ls -la $ANDROID_HOME || true
      - ls -la $ANDROID_HOME/platforms || true
      - ls -la $ANDROID_HOME/build-tools || true
      - sdkmanager --list || true
      - sdkmanager --list_installed || true


      - |
        MASST_EXE=$(find masst -type f -name "MASSTCLI*" | head -1)

        echo "Using: $MASST_EXE"

        "$MASST_EXE" \
          -input="app-release.aab" \
          -config="bluebeetle_config.bm" \
          -keystore="Bluebeetle.jks" \
          -storePassword="bugs@1234" \
          -alias="key0" \
          -keyPassword="bugs@1234" \
          -v=true \
          -apk

  post_build:
    commands:
      - mkdir -p output
      - find .
      - cp -r *.apk output/ || true
      - cp -r *.aab output/ || true
      - cp -r *.json output/ || true
      - cp -r *.html output/ || true

artifacts:
  files:
    - '**/*'