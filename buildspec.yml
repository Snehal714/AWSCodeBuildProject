version: 0.2

env:
  variables:
    LINUX_DOWNLOAD_URL: "https://storage.googleapis.com/masst-assets/Defender-Binary-Integrator/1.0.0/Linux/MASSTCLI-v1.1.0-linux-amd64.zip"

phases:
  build:
    commands:
      - echo "Downloading MASSTCLI..."
      - curl -L -o MASSTCLI.zip "$LINUX_DOWNLOAD_URL"

      - unzip -q MASSTCLI.zip -d masst

      - chmod +x $(find masst -type f -name "MASSTCLI*" | head -1)

      - echo "Repository contents:"
      - ls -la

      - echo "Checking required files..."

      - |
        MASST_EXE=$(find masst -type f -name "MASSTCLI*" | head -1)

        echo "Using: $MASST_EXE"

        "$MASST_EXE" \
          -input="app-release.aab" \
          -config="bluebeetle_config.bm" \
          -keystore="Bluebeetle.jks" \
          -storePassword="bugs@1234" \
          -alias="key0" \
          -keyPassword="bugs@1234" \
          -v=true \
          -apk

  post_build:
    commands:
      - mkdir -p output
      - find .
      - cp -r *.apk output/ || true
      - cp -r *.aab output/ || true
      - cp -r *.json output/ || true
      - cp -r *.html output/ || true

artifacts:
  files:
    - '**/*'