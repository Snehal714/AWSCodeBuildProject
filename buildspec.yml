version: 0.2

env:
  variables:
    LINUX_DOWNLOAD_URL: "https://storage.googleapis.com/masst-assets/Defender-Binary-Integrator/1.0.0/Linux/MASSTCLI-v1.1.0-linux-amd64.zip"

phases:
  build:
    commands:
      - echo "Downloading MASSTCLI..."
      - curl -L -o MASSTCLI.zip "$LINUX_DOWNLOAD_URL"

      - echo "Extracting..."
      - unzip -q MASSTCLI.zip -d masst

      - echo "Files extracted:"
      - find masst

      - echo "Giving execute permission..."
      - chmod +x $(find masst -type f -name "MASSTCLI*" | head -1)

      - echo "Permissions:"
      - ls -l $(find masst -type f -name "MASSTCLI*" | head -1)

artifacts:
  files:
    - '**/*'